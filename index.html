<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Art</title>

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 90px;
  background: #E6D6F2;

  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
}

/* LOGO */
.logo-container img {
  height: 110px;
}

/* NAV LINKS */
.navbar a {
  color: black;
  margin-left: 25px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: calc(100vh - 90px);
  margin-top: 90px;

  background:
    linear-gradient(rgba(120,60,150,0.4), rgba(120,60,150,0.4)),
    url('bg.jpg') center/cover no-repeat;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 50px;
}

/* BUTTON */
.explore-btn {
  padding: 15px 30px;
  border-radius: 30px;
  border: none;
  background: #ff4b2b;
  color: white;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: #E6D6F2;
  text-align: center;
  padding: 20px;
}

</style>
</head>

<body>

<header class="navbar">

  <div class="logo-container">
    <img src="logo.png">
  </div>

  <nav>
    <a href="/my-art-website/">Home</a>
    <a href="/my-art-website/gallery.html">Gallery</a>
  </nav>

</header>

<section class="hero">
  <h1>Welcome To My Art World 🎨</h1>
  <p>Creative • Strong • Unstoppable</p>

  <button class="explore-btn"
    onclick="window.location.href='/my-art-website/gallery.html'">
    Explore Art
  </button>
</section>

<footer>
  <p>Follow me on Instagram: fiercestrokes_</p>
</footer>

</body>
</html>
