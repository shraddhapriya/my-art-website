<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Art</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 90px;

  background: rgba(230, 214, 242, 0.95); /* light lavender */
  backdrop-filter: blur(8px);

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 40px;
  z-index: 1000;
}

/* LOGO */
.logo-container img {
  height: 100px;
}

/* NAV LINKS */
nav {
  display: flex;
  align-items: center;
}

.navbar a {
  color: black;
  margin-left: 25px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.navbar a:hover {
  color: #7a3ea1;
}

/* HERO SECTION */
.hero {
  height: calc(100vh - 90px);
  margin-top: 90px;

  background:
    linear-gradient(rgba(120, 60, 150, 0.4), rgba(120, 60, 150, 0.4)),
    url('bg.jpg') center/cover no-repeat;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  color: white;
  text-align: center;
}

/* TEXT */
.hero h1 {
  font-size: 55px;
  text-shadow: 2px 2px 15px rgba(0,0,0,0.7);
}

.hero p {
  font-size: 20px;
}

/* BUTTON */
.explore-btn {
  padding: 15px 30px;
  border-radius: 30px;
  border: none;
  background: #ff4b2b;
  color: white;
  cursor: pointer;
  margin-top: 20px;
  animation: pulse 2s infinite;
}

.explore-btn:hover {
  transform: scale(1.1);
}

/* ANIMATION */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,75,43,0.7); }
  70% { box-shadow: 0 0 0 20px rgba(255,75,43,0); }
}

/* FOOTER */
footer {
  background: #E6D6F2; /* light lavender */
  color: black;
  text-align: center;
  padding: 20px;
}

</style>
</head>

<body>

<header class="navbar">
  <div class="logo-container">
    <img src="logo.png" alt="Logo">
  </div>

  <nav>
    <a href="/my-art-website/">Home</a>
    <a href="/my-art-website/gallery.html">Gallery</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome To My Art World 🎨</h1>
  <p>Creative • Strong • Unstoppable</p>

  <button class="explore-btn"
    onclick="window.location.href='/my-art-website/gallery.html'">
    Explore Art
  </button>
</section>

<footer>
  <p>Follow me on Instagram: yourusername</p>
</footer>

</body>
</html>
