<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #F3E8FF, #E6D6F2);
  text-align: center;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
  background: #E6D6F2;
  padding: 15px;
}

.navbar a {
  color: black;
  margin: 0 20px;
  text-decoration: none;
  font-weight: bold;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, 250px);
  justify-content: center;
  gap: 30px;
  padding: 40px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* IMAGE FIX */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  object-position: center;
}

/* BUTTON */
.enquire-btn {
  padding: 10px;
  border: none;
  background: #ff4b2b;
  color: white;
  cursor: pointer;
  margin-bottom: 15px;
  border-radius: 20px;
}

</style>
</head>

<body>

<header class="navbar">
  <a href="/my-art-website/">Home</a>
  <a href="/my-art-website/gallery.html">Gallery</a>
</header>

<h1>My Art Collection 🎨</h1>

<div class="gallery">

  <div class="card"><img src="art1.jpg"><p>Artwork 1</p><button class="enquire-btn">Enquire</button></div>
  <div class="card"><img src="art2.jpg"><p>Artwork 2</p><button class="enquire-btn">Enquire</button></div>
  <div class="card"><img src="art3.jpg"><p>Artwork 3</p><button class="enquire-btn">Enquire</button></div>
  <div class="card"><img src="art4.jpg"><p>Artwork 4</p><button class="enquire-btn">Enquire</button></div>
  <div class="card"><img src="art5.jpg"><p>Artwork 5</p><button class="enquire-btn">Enquire</button></div>
  <div class="card"><img src="art6.jpg"><p>Artwork 6</p><button class="enquire-btn">Enquire</button></div>
  <div class="card"><img src="art7.jpg"><p>Artwork 7</p><button class="enquire-btn">Enquire</button></div>

</div>

</body>
</html>
