<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #89f7fe, #66a6ff);
  text-align: center;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
  background: black;
  padding: 15px;
}

.navbar a {
  color: white;
  margin: 0 20px;
  text-decoration: none;
  font-weight: bold;
  cursor: pointer;
}

/* GALLERY */
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.card {
  background: white;
  margin: 15px;
  border-radius: 15px;
  width: 250px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* BUTTON */
.enquire-btn {
  padding: 10px;
  border: none;
  background: #ff4b2b;
  color: white;
  cursor: pointer;
  margin-bottom: 15px;
  border-radius: 20px;
}

</style>
</head>

<body>

<header class="navbar">
  <!-- ✅ GUARANTEED WORKING -->
  <a onclick="window.location.href='index.html'">Home</a>
  <a onclick="window.location.href='gallery.html'">Gallery</a>
</header>

<h1>My Art Collection 🎨</h1>

<div class="gallery">

  <div class="card">
    <img src="art1.jpg">
    <p>Artwork 1</p>
    <button class="enquire-btn"
      onclick="window.location.href='https://instagram.com/yourusername'">
      Enquire / Order
    </button>
  </div>

  <div class="card">
    <img src="art2.jpg">
    <p>Artwork 2</p>
    <button class="enquire-btn"
      onclick="window.location.href='https://instagram.com/yourusername'">
      Enquire / Order
    </button>
  </div>

  <div class="card">
    <img src="art3.jpg">
    <p>Artwork 3</p>
    <button class="enquire-btn"
      onclick="window.location.href='https://instagram.com/yourusername'">
      Enquire / Order
    </button>
  </div>

</div>

</body>
</html>
