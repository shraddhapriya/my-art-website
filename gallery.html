<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #F3E8FF, #E6D6F2);
  text-align: center;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
  background: #E6D6F2;
  padding: 15px;
}

.navbar a {
  color: black;
  margin: 0 20px;
  text-decoration: none;
  font-weight: bold;
}

/* TITLE */
h1 {
  margin-top: 20px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, 250px);
  justify-content: center;
  gap: 30px;
  padding: 40px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  object-position: center;
}

/* ENQUIRE BUTTON (NOW LINK STYLE) */
.enquire-btn {
  display: inline-block;
  padding: 10px 20px;
  background: #ff4b2b;
  color: white;
  text-decoration: none;
  border-radius: 20px;
  margin-bottom: 15px;
}

.enquire-btn:hover {
  background: #ff416c;
}

</style>
</head>

<body>

<header class="navbar">
  <a href="/my-art-website/">Home</a>
  <a href="/my-art-website/gallery.html">Gallery</a>
</header>

<h1>My Art Collection 🎨</h1>
