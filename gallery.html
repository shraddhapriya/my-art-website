<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #F3E8FF, #E6D6F2);
  text-align: center;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
  background: #E6D6F2;
  padding: 15px;
}

.navbar a {
  color: black;
  margin: 0 20px;
  text-decoration: none;
  font-weight: bold;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, 250px);
  justify-content: center;
  gap: 30px;
  padding: 40px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  cursor: pointer;
}

/* BUTTONS */
.btn {
  display: inline-block;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 20px;
  color: white;
  text-decoration: none;
}

.insta { background: #ff4b2b; }
.whatsapp { background: #25D366; }

/* FULLSCREEN VIEW */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

#popup img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

</style>
</head>
